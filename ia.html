<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente Ganadero - Calculadora Ganadera</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Estilos específicos para el chat */
.chat-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
                url("https://images.unsplash.com/photo-1500595046743-cd271d694d30");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}

.chat-header {
    background: rgba(76, 175, 80, 0.9);
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-bottom: 2px solid #4CAF50;
}

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.4;
    animation: fadeIn 0.5s ease-in;
}

.message.user {
    align-self: flex-end;
    background: #4CAF50;
    color: white;
}

.message.bot {
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.9);
    color: #333;
}

.chat-input-area {
    display: flex;
    padding: 15px;
    background: rgba(0, 0, 0, 0.8);
    border-top: 1px solid #4CAF50;
}

#chatInput {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 25px;
    outline: none;
    font-size: 16px;
    margin-right: 10px;
}

#sendButton {
    background: #4CAF50;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: white;
    transition: background 0.3s, transform 0.2s;
}

#sendButton:hover {
    background: #388E3C;
    transform: scale(1.1);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
    .chat-messages {
        padding: 10px;
    }
    .message {
        max-width: 85%;
    }
    .chat-input-area {
        padding: 10px;
    }
}
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <a href="index.html" style="position: absolute; left: 15px; color: white; text-decoration: none; font-size: 16px;">← Volver</a>
        Asistente Ganadero 🤖🐄
        <br><small>Haz preguntas sobre ganado</small>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            ¡Hola! Soy el Asistente Ganadero. Pregúntame sobre vacas, toros, cerdos, gallinas o caballos. ¿En qué puedo ayudarte?
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Escribe tu pregunta aquí...">
        <button id="sendButton">📤</button>
    </div>
</div>

<script src="ia.js"></script>

</body>
</html>
